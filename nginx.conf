# ─────────────────────────────────────────────────────────────────────────────
# Menuify — Nginx configuration
#
# Handles:
#   - Angular client-side routing (all paths → index.html)
#   - Wildcard subdomain support (blackrabbit.menuify.tn, etc.)
#   - Gzip compression
#   - Static asset caching
#   - Security headers
#   - Health check endpoint
# ─────────────────────────────────────────────────────────────────────────────

# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml
  font/woff2;

server {
    listen 80;

    # Match any subdomain — Nginx handles all subdomains in one block.
    # The Angular app's SubdomainService reads window.location.hostname
    # to decide whether to show the dashboard or the public menu page.
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Health check endpoint (used by Docker HEALTHCHECK) ────────────────────
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Static assets — long cache, immutable ────────────────────────────────
    # Angular build fingerprints filenames so this is safe
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        try_files   $uri =404;
    }

    # ── Angular app — all routes fall back to index.html ─────────────────────
    # This is what makes client-side routing work.
    # The Angular router takes over after the browser loads index.html.
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must not be cached — browser always fetches fresh copy
        # so new deployments take effect immediately
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }
}
