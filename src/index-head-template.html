<head>
  <meta charset="utf-8">
  <title>Menuify - Digital Menu Platform</title>
  <base href="/">

  <!-- Viewport & Basic Meta Tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage your restaurant menu with QR codes, receive orders in real-time, and track customer orders. Free digital menu solution for modern restaurants.">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="index, follow">
  <meta name="language" content="English">
  <meta name="keywords" content="restaurant menu, digital menu, QR code, food ordering, restaurant management">

  <!-- Canonical URL (update for each page) -->
  <link rel="canonical" href="https://menuify.tn/">

  <!-- Open Graph Tags (for social media) -->
  <meta property="og:title" content="Menuify - Digital Menu Platform for Restaurants">
  <meta property="og:description" content="Manage your restaurant menu with QR codes, receive orders in real-time, and track customer orders.">
  <meta property="og:url" content="https://menuify.tn/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://menuify.tn/assets/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Menuify - Digital Menu Platform">
  <meta name="twitter:description" content="Modern digital menu solution for restaurants.">
  <meta name="twitter:image" content="https://menuify.tn/assets/og-image.png">

  <!-- Favicon (SVG primary, PNG fallbacks for compatibility) -->
  <link rel="icon" type="image/svg+xml" href="/assets/brand/favicon.svg">
  <link rel="icon" type="image/png" href="/assets/favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/png" href="/assets/favicon-16x16.png" sizes="16x16">
  <!-- Fallback for older browsers -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

  <!-- Font Preconnect & Loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- DNS Prefetch for API -->
  <link rel="dns-prefetch" href="https://api.menuify.tn/api/public/tenants">

  <!-- JSON-LD Structured Data (Organization) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Menuify",
    "url": "https://menuify.tn",
    "logo": "https://menuify.tn/assets/logo.png",
    "description": "Digital menu platform for restaurants",
    "sameAs": [
      "https://twitter.com/menuify",
      "https://facebook.com/menuify"
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "Customer Service",
      "email": "support@menuify.tn"
    }
  }
  </script>

  <!-- JSON-LD Structured Data (SoftwareApplication) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Menuify",
    "description": "Digital menu platform for restaurants with QR codes and order tracking",
    "url": "https://menuify.tn",
    "screenshot": "https://menuify.tn/assets/screenshot.png",
    "applicationCategory": "BusinessApplication",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "TND"
    }
  }
  </script>

</head>
