@if (visible()) {
<div class="imb">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
    </svg>
    <span class="imb__text">
        Impersonating <strong>{{ ownerEmail() }}</strong>
        — changes made here affect the real account
    </span>
    <button class="imb__exit" (click)="exit()" type="button">
        Exit impersonation
    </button>
</div>
}
