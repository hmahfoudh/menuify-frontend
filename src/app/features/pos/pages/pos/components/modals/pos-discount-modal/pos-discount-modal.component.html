<div class="pos-modal-backdrop" (click)="dismiss.emit()">
  <div class="pos-modal pos-modal--sm" (click)="$event.stopPropagation()">
    <div class="pos-modal__head">
      <h3 class="pos-modal__name">{{ 'pos.discount.title' | translate }}</h3>
      <button class="pos-modal__close" (click)="dismiss.emit()" type="button">✕</button>
    </div>
    <div class="pos-modal__sm-body">
      <div class="pos-disc-tabs">
        <button class="pos-disc-tab" [class.pos-disc-tab--active]="discountMode === 'fixed'"
                (click)="discountModeChange.emit('fixed')" type="button">{{ 'pos.discount.fixed' | translate }}</button>
        <button class="pos-disc-tab" [class.pos-disc-tab--active]="discountMode === 'percent'"
                (click)="discountModeChange.emit('percent')" type="button">{{ 'pos.discount.percent' | translate }}</button>
      </div>
      <input class="pos-field__input pos-field__input--lg"
             type="number" step="0.001" min="0"
             [value]="discountInput"
             (input)="discountInputChange.emit($any($event.target).value)"
             [placeholder]="'pos.discount.placeholder' | translate" autocomplete="off">
    </div>
    <div class="pos-modal__sm-actions">
      <button class="pos-modal__confirm-btn pos-modal__confirm-btn--orange pos-modal__confirm-btn--full"
              (click)="apply.emit()" type="button">
        {{ 'pos.discount.apply' | translate }}
      </button>
    </div>
  </div>
</div>
