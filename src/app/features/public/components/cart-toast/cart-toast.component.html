<div class="mp-toast" [class.mp-toast--visible]="toast.visible" role="status" aria-live="polite">
  <div class="mp-toast__icon">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12" />
    </svg>
  </div>
  <div class="mp-toast__body">
    <span class="mp-toast__title">{{ 'toast.added' | translate }}</span>
    <span class="mp-toast__name">{{ toast.name }}</span>
  </div>
  <button class="mp-toast__cart" (click)="viewCart.emit()" type="button">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2.2" stroke-linecap="round">
      <circle cx="9" cy="21" r="1" />
      <circle cx="20" cy="21" r="1" />
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
    </svg>
    {{ 'toast.view_cart' | translate }}
    <span class="mp-toast__count">{{ cartCount }}</span>
  </button>
</div>
