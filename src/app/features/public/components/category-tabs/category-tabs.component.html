<nav class="mp-tabs" aria-label="Menu categories">
  <div class="mp-tabs__inner">
    @for (cat of categories; track cat.id) {
    <button class="mp-tab" [class.mp-tab--active]="activeCategory === cat.id" (click)="selectCategory.emit(cat.id)"
      type="button">
      @if (cat.icon) { <span>{{ cat.icon }}</span> }
      {{ cat.name }}
    </button>
    }
  </div>

  <!-- Subcategory chips — visible only when active category has subcategories -->
  @if (subcategories.length > 0) {
  <div class="mp-chips">
    @for (sub of subcategories; track sub.id) {
    <button class="mp-chip" [class.mp-chip--active]="activeSubcategory === sub.id"
      (click)="selectSubcategory.emit(sub.id)" type="button">
      @if (sub.icon) { <span>{{ sub.icon }}</span> }
      {{ sub.name }}
    </button>
    }
  </div>
  }
</nav>
