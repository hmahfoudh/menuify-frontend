<div class="mp-backdrop">
  <div class="mp-success">

    <!-- Animated checkmark -->
    <div class="mp-success__icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12" />
      </svg>
    </div>

    <h2 class="mp-success__title">{{ 'success.title' | translate }}</h2>

    <!-- Order reference -->
    <div class="mp-success__ref-box">
      <span class="mp-success__ref-label">{{ 'success.ref_label' | translate }}</span>
      <span class="mp-success__ref-code">{{ latestOrderRef }}</span>
      <span class="mp-success__ref-hint">
        {{ 'success.ref_hint' | translate }}
      </span>
    </div>

    <!-- Status steps -->
    <div class="mp-success__steps">
      <div class="mp-success__step mp-success__step--done">
        <span class="mp-success__step-dot">✓</span>
        <span>{{ 'success.step_placed' | translate }}</span>
      </div>
      <div class="mp-success__step-line"></div>
      <div class="mp-success__step mp-success__step--active">
        <span class="mp-success__step-dot mp-success__step-dot--pulse"></span>
        <span>{{ 'success.step_preparing' | translate }}</span>
      </div>
      <div class="mp-success__step-line"></div>
      <div class="mp-success__step">
        <span class="mp-success__step-dot mp-success__step-dot--empty"></span>
        <span>{{ 'success.step_ready' | translate }}</span>
      </div>
    </div>

    <p class="mp-success__desc">
      {{ 'success.desc' | translate }}
    </p>

    <div class="mp-success__actions">
      <button class="mp-success__btn mp-success__btn--track" (click)="openTracking.emit()" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
        {{ 'success.track_btn' | translate }}
      </button>
      <button class="mp-success__btn mp-success__btn--ghost" (click)="backToMenu.emit()" type="button">
        {{ 'success.back_to_menu' | translate }}
      </button>
    </div>

  </div>
</div>
