<div class="mp-closed-banner">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
    stroke-linecap="round">
    <circle cx="12" cy="12" r="10" />
    <polyline points="12 6 12 12 16 14" />
  </svg>
  <div class="mp-closed-banner__text">
    <span class="mp-closed-banner__title">{{ 'closed_banner.title' | translate }}</span>
    @if (nextOpenTime) {
    <span class="mp-closed-banner__sub">{{ nextOpenTime }}</span>
    }
  </div>
</div>
