<div class="mp-bottom-bar" [class.mp-bottom-bar--has-order]="hasActiveOrders">

  <!-- ── Cart side ─────────────────────────────────────────────── -->
  <button class="mp-bottom-bar__cart" (click)="toggleCart.emit()" type="button"
    [attr.aria-label]="'bottom_bar.cart_aria' | translate">
    <div class="mp-bbc__icon-wrap" [class.mp-bbc__icon-wrap--filled]="!cartEmpty">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round">
        <circle cx="9" cy="21" r="1" />
        <circle cx="20" cy="21" r="1" />
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
      </svg>
      @if (!cartEmpty) {
      <span class="mp-bbc__count">{{ cartCount }}</span>
      }
    </div>
    <div class="mp-bbc__text">
      @if (cartEmpty) {
      <span class="mp-bbc__empty-label">{{ 'bottom_bar.your_cart' | translate }}</span>
      } @else {
      <span class="mp-bbc__items-label">
        {{ cartCount }} {{ (cartCount > 1 ? 'bottom_bar.items' : 'bottom_bar.item') | translate }}
      </span>
      <span class="mp-bbc__total">
        {{ fmt(cartSubtotal) }} {{ currency }}
      </span>
      }
    </div>
  </button>

  <!-- ── Divider (only when orders exist) ────────────────────── -->
  @if (hasActiveOrders) {
  <div class="mp-bottom-bar__divider"></div>
  }

  <!-- ── Single track button ─────────────────────────────────── -->
  @if (hasActiveOrders) {
  <button class="mp-bottom-bar__tracker" (click)="openTracking.emit()" type="button"
    [attr.aria-label]="'bottom_bar.track_orders_aria' | translate">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round">
      <circle cx="12" cy="12" r="10" />
      <polyline points="12 6 12 12 16 14" />
    </svg>
    <div class="mp-bbt__text">
      <span class="mp-bbt__status">{{ 'bottom_bar.track_orders' | translate }}</span>
    </div>
    <span class="mp-bbt__count">{{ activeOrdersCount }}</span>
  </button>
  }

</div>
