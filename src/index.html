<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Menuify - Plateforme de menus numériques pour les restaurants et cafés</title>
  <base href="/">

  <!-- Viewport & Basic Meta Tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gérez votre menu de restaurant & café avec des codes QR, recevez les commandes en temps réel et suivez les commandes des clients. Solution de menu numérique gratuite pour les restaurants modernes.">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <meta name="language" content="fr">
  <meta name="keywords" content="menu restaurant, menu digital, code QR, menu café, gestion de restaurant">
  <meta name="author" content="EDSolutions">
  <meta name="application-name" content="Menuify">

  <!-- Canonical URL (update for each page) -->
  <link rel="canonical" href="https://menuify.tn/">

  <!-- Open Graph Tags (for social media) -->
  <meta property="og:title" content="Menuify - Plateforme de menus numériques pour les restaurants et cafés">
  <meta property="og:description" content="Gérez votre menu de restaurant & café avec des codes QR, recevez les commandes en temps réel et suivez les commandes des clients. Solution de menu numérique gratuite pour les restaurants modernes.">
  <meta property="og:url" content="https://menuify.tn/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://menuify.tn/assets/brand/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Menuify - Plateforme de menus numériques pour les restaurants et cafés">
  <meta name="twitter:description" content="Gérez votre menu de restaurant & café avec des codes QR, recevez les commandes en temps réel et suivez les commandes des clients. Solution de menu numérique gratuite pour les restaurants modernes.">
  <meta name="twitter:image" content="https://menuify.tn/assets/brand/og-image.png">

  <!-- Favicon (SVG primary, PNG fallbacks for compatibility) -->
  <link rel="icon" type="image/svg+xml" href="/assets/brand/favicon.svg">
  <link rel="icon" type="image/svg+xml" href="/assets/brand/favicon.svg" sizes="32x32">
  <link rel="icon" type="image/svg+xml" href="/assets/brand/favicon.svg" sizes="16x16">
  <!-- Fallback for older browsers -->
  <link rel="icon" type="image/x-icon" href="/assets/brand/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png">
  <link rel="preload" as="image" href="https://menuify.tn/assets/brand/og-image.png">

  <!-- Font Preconnect & Loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap">

  <!-- DNS Prefetch for API -->
  <link rel="dns-prefetch" href="https://api.menuify.tn/api/public/tenants">

  <!-- JSON-LD Structured Data (Organization) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Menuify",
    "url": "https://menuify.tn",
    "logo": "https://menuify.tn/assets/logo.png",
    "description": "Plateforme de menus numériques pour les restaurants et cafés avec des codes QR et un suivi en temps réel des commandes",
    "sameAs": [
      "https://twitter.com/menuify",
      "https://facebook.com/menuify"
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "Customer Service",
      "email": "support@menuify.tn"
    }
  }
  </script>

  <!-- JSON-LD Structured Data (SoftwareApplication) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Menuify",
      "url": "https://menuify.tn",
      "description": "Plateforme de menus numériques pour les restaurants et cafés avec des codes QR et un suivi en temps réel des commandes",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "browserRequirements": "Requires JavaScript. Works on Chrome, Firefox, Safari, Edge",
      "screenshot": "https://menuify.tn/assets/brand/screenshot.png",

      "image": "https://menuify.tn/assets/brand/screenshot.png",

      "inLanguage": ["en", "fr", "ar"],
      "availableOnDevice": "Desktop, Tablet, Mobile",

      "offers": {
        "@type": "Offer",
        "price": "25",
        "priceCurrency": "TND",
        "availability": "https://schema.org/InStock"
      },

      "featureList": [
        "Accès au menu par code QR",
        "Suivi en temps réel des commandes",
        "Tableau de bord de gestion du restaurant"
      ],

      "provider": {
        "@type": "Organization",
        "name": "EDSolutions",
        "url": "https://edsolutions.tn"
      }
    }
  </script>

</head>

<body>
  <app-root></app-root>
</body>

</html>
